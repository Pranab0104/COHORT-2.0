<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashBoard UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <h1>Productivity DashBoard</h1>

      <!-- <nav></nav> -->
      <section class="allelem">
        <div class="todo elem" id="1">
          <img
            src="https://i.pinimg.com/736x/ab/25/21/ab25215cb6383d3f25cfed4a32e61cb5.jpg"
            alt=""
          />
          <h2>To Do List</h2>
        </div>
        <div class="daily elem" id="2">
          <img
            src="https://media.istockphoto.com/id/2228659917/photo/isolated-calendar-with-green-check-mark-for-confirmed-schedule.jpg?s=612x612&w=0&k=20&c=lLRuO9uTfj8fxvEvdHMT7E_Iy7BlO3n3JmCsMGsRG1g="
            alt=""
          />
          <h2>Daily Plans</h2>
        </div>
        <div class="moti elem" id="3">
          <img
            src="https://plus.unsplash.com/premium_photo-1687873117115-e9b0d4e37b5e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjV8fDNkJTIwbW90aXZhdGlvbnxlbnwwfHwwfHx8MA%3D%3D"
            alt=""
          />
          <h2>Motivation</h2>
        </div>
        <div class="pomo elem" id="4">
          <img
            src="https://media.istockphoto.com/id/1816436180/photo/concept-business-work-time-3d-render-minimal-alarm-clock-with-colorful-floating-confetti.jpg?s=612x612&w=0&k=20&c=icYLojCgId_H4IvBSUmhTJy0wNUewgFaRz6gLZAlA9c="
            alt=""
          />
          <h2>Pomodoro Timer</h2>
        </div>
        <div class="goal elem" id="5">
          <img
            src="https://plus.unsplash.com/premium_photo-1682309772037-8da49abb2b84?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDF8fHxlbnwwfHx8fHw%3D"
            alt=""
          />
          <h2>Daily Goals</h2>
        </div>
      </section>

      <section class="fullelem">
        <div class="line">
          <h3>To do Page</h3>
        </div>
      </section>
      <section class="fullelem">
        <div class="line">
          <h3>Plans</h3>
        </div>
      </section>
      <section class="fullelem">
        <div class="line">
          <h3>Quotes</h3>
        </div>
      </section>
      <section class="fullelem">
        <div class="line">
          <h3>Timer</h3>
        </div>
      </section>
      <section class="fullelem">
        <div class="line">
          <h3>Goals</h3>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
